<!DOCTYPE html>
<html lang="ja">
<head>

<title>videos</title>

<style>
body{
  margin:0;
  background:#eeeeee;
  font-family:sans-serif;

.title{

}

.video{
  width:90%;
  max-width:520px;
  height:230px;
  background:black;
  margin:20px auto;

  position:relative;
}

.play{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:0;
  height:0;
  border-left:45px solid white;
  border-top:28px solid transparent;
  border-bottom:28px solid transparent;
}
</style>
</head>
